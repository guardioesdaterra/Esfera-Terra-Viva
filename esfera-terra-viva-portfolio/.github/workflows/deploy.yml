name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: esfera-terra-viva-portfolio/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: esfera-terra-viva-portfolio

      - name: Build
        run: npm run build -- --base=/Esfera-Terra-Viva/
        working-directory: esfera-terra-viva-portfolio

      - name: Copy data files
        run: |
          mkdir -p dist/2026-07-04_09-46-10
          cp -r 2026-07-04_09-46-10/esferaterraviva.json dist/2026-07-04_09-46-10/
          cp -r 2026-07-04_09-46-10/esferaterraviva.csv dist/2026-07-04_09-46-10/
        working-directory: esfera-terra-viva-portfolio

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: esfera-terra-viva-portfolio/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
